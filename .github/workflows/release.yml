name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build for Linux
        run: GOOS=linux GOARCH=amd64 go build -o telegram-bot-linux-amd64 ./cmd/app

      - name: Build for macOS
        run: GOOS=darwin GOARCH=amd64 go build -o telegram-bot-darwin-amd64 ./cmd/app

      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o telegram-bot-windows-amd64.exe ./cmd/app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            telegram-bot-linux-amd64
            telegram-bot-darwin-amd64
            telegram-bot-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
