name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Полная история для получения всех коммитов

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build for Linux
        run: GOOS=linux GOARCH=amd64 go build -o telegram-bot-linux-amd64 ./cmd/app

      - name: Build for macOS
        run: GOOS=darwin GOARCH=amd64 go build -o telegram-bot-darwin-amd64 ./cmd/app

      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o telegram-bot-windows-amd64.exe ./cmd/app

      - name: Generate Changelog
        id: changelog
        run: |
          # Получение текущего и предыдущего тега
          CURRENT_TAG=${{ github.ref_name }}
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -B 1 $CURRENT_TAG | head -n 1)

          # Если это первый тег, используем первый коммит
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          # Формирование changelog из сообщений коммитов
          CHANGELOG=$(git log --pretty="* %s (%h)" $PREVIOUS_TAG..$CURRENT_TAG)

          # Сохранение changelog в файл
          echo -e "# Changelog\n\n## $CURRENT_TAG\n\n$CHANGELOG" > CHANGELOG.md

          # Экранирование changelog для передачи в output
          CHANGELOG_ESCAPED=$(echo "$CHANGELOG" | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "changelog=$CHANGELOG_ESCAPED" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            telegram-bot-linux-amd64
            telegram-bot-darwin-amd64
            telegram-bot-windows-amd64.exe
            CHANGELOG.md
          body: |
            ## ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
