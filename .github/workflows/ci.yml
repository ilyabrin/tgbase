name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build -v ./cmd/app

      - name: Run unit tests with mocks
        run: go test -v -short -coverprofile=coverage.out ./...

      - name: Run integration tests (skipped if no Redis available)
        run: |
          echo "Running integration tests..."
          go test -v ./internal/redis/ -run TestRedisClient_Integration || echo "Integration tests skipped - Redis not available"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
