name: Redis Integration Tests

on:
  push:
    branches: [master]
    paths:
      - 'internal/redis/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/redis-tests.yml'
  pull_request:
    branches: [master]
    paths:
      - 'internal/redis/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/redis-tests.yml'
  workflow_dispatch: # Allow manual triggering

jobs:
  redis-tests:
    name: Redis Integration Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ['1.23', '1.24']
        redis-version: ['6-alpine', '7-alpine', '7.4-alpine']

    services:
      redis:
        image: redis:${{ matrix.redis-version }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Redis CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools

      - name: Verify Redis connection
        run: |
          redis-cli ping
          redis-cli info server | grep redis_version
          echo "Redis ${{ matrix.redis-version }} is ready!"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download dependencies
        run: go mod download

      - name: Run Redis integration tests
        env:
          REDIS_ADDR: localhost:6379
        run: |
          echo "Running Redis integration tests with Go ${{ matrix.go-version }} and Redis ${{ matrix.redis-version }}"
          go test -v -race -coverprofile=coverage-redis.out ./internal/redis/

      - name: Run Redis stress tests
        env:
          REDIS_ADDR: localhost:6379
        run: |
          echo "Running Redis stress tests..."
          go test -v -run="TestRedisClient_KeyValueOperations|TestRedisClient_CounterOperations|TestRedisClient_HashOperations" -count=5 ./internal/redis/

      - name: Test Redis error handling
        env:
          REDIS_ADDR: localhost:9999  # Wrong port to test error handling
        run: |
          echo "Testing Redis error handling..."
          go test -v -run="TestRedisClient_ErrorHandling|TestNewRedisClient_Configurations" ./internal/redis/

      - name: Upload Redis test coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage-redis.out
          flags: redis-integration
          name: redis-tests-go${{ matrix.go-version }}-redis${{ matrix.redis-version }}
          token: ${{ secrets.CODECOV_TOKEN }}
        if: matrix.go-version == '1.24' && matrix.redis-version == '7-alpine'

  redis-docker-compose-test:
    name: Test with Docker Compose
    runs-on: ubuntu-latest
    needs: redis-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Test with Docker Compose
        run: |
          echo "Testing Redis with Docker Compose setup..."
          docker-compose up -d redis

          # Wait for Redis to be ready
          echo "Waiting for Redis to be ready..."
          for i in {1..30}; do
            if docker-compose exec -T redis redis-cli ping > /dev/null 2>&1; then
              echo "Redis is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          # Run tests
          go test -v ./internal/redis/

          # Clean up
          docker-compose down

  redis-performance-test:
    name: Redis Performance Tests
    runs-on: ubuntu-latest
    needs: redis-tests

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run performance benchmarks
        env:
          REDIS_ADDR: localhost:6379
        run: |
          echo "Running Redis performance benchmarks..."
          go test -v -bench=. -benchmem -run=^$ ./internal/redis/ || echo "No benchmarks found, creating simple performance test..."

          # Create a simple performance test
          cat > /tmp/perf_test.go << 'EOF'
          package main

          import (
              "context"
              "fmt"
              "time"
              "tgbase/internal/redis"
          )

          func main() {
              cfg := struct {
                  Addr     string
                  Password string
                  DB       int
              }{
                  Addr:     "localhost:6379",
                  Password: "",
                  DB:       0,
              }

              ctx := context.Background()
              client, err := redis.NewRedisClient(ctx, cfg)
              if err != nil {
                  panic(err)
              }
              defer client.Close()

              // Performance test
              start := time.Now()
              for i := 0; i < 1000; i++ {
                  key := fmt.Sprintf("perf_test_%d", i)
                  client.Set(ctx, key, "test_value", 0)
                  client.Get(ctx, key)
                  client.Del(ctx, key)
              }
              duration := time.Since(start)

              fmt.Printf("1000 SET+GET+DEL operations took: %v\n", duration)
              fmt.Printf("Average per operation: %v\n", duration/1000)
          }
          EOF

          go run /tmp/perf_test.go